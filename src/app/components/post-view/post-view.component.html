@if(post()){
<button class="edit-button" [routerLink]="['/edit', post()?.id]">Edit</button>
<button [disabled]="!hasSelection()" (click)="openDialog()">Annotate</button>
<div class="post-view">
  <h1>{{post()?.title}}</h1>
  <div #postBody class="post-body">{{post()?.body}}</div>
</div>
}


<button (click)="test()">Test</button>

<dialog #dialog class="dialog">
  <app-anotation-edit></app-anotation-edit>
  <button class="close-button" (click)="closeDialog()">X</button>
</dialog>

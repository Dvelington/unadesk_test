<app-search-input class="search" (search)="search($event)">Search input</app-search-input>
<button class="button add-button" [routerLink]="['/new']">+ Add post</button>
<hr>

<div class="post-list">

  @for (post of posts(); track post.id) {
  <app-post-list-item [post]="post"></app-post-list-item>
  }
  @if(posts().length === 0){
  <span>No posts. Create new or check search input</span>
  }
</div>

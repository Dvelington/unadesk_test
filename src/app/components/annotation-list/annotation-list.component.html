<div class="header">
  Annotations
  <hr>
</div>
<div class="annotation-list">
  @for (annotation of annotations(); track annotation.annotation.id) {
  <div class="chips" [title]="annotation.selection.text" [ngStyle]="{'background-color': annotation.annotation.color}"
    (click)="openEditor(annotation)">
    <div class="truncate">{{annotation.selection.text}}</div>
    <div class="button chip-button" (click)="removeAnnotation($event,annotation)">&#x2715;</div>
  </div>
  }
</div>

<dialog #dialog class="dialog" data-annotation="annotation">
  <app-anotation-edit></app-anotation-edit>
  <button class="button close-button" (click)="closeDialog()">&#x2715;</button>
</dialog>
